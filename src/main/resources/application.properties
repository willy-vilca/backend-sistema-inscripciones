spring.application.name=sistema-inscripciones-api

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/sistema_inscripciones
spring.datasource.username=postgres
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Lima

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

app.frontend.url=http://localhost:5173
app.upload-dir=uploads
app.security.admin-token-secret=sistema-inscripciones-admin-local-secret
app.security.admin-token-hours=8
